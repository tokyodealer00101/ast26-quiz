author: "ivylingchiang"
date: "2026-05-27"

question: |
  在評估儲存系統的壓縮效益時，總體讀取時間通常由磁碟 I/O 時間與 CPU 解壓縮時間共同決定。當系統採用高速儲存介面（如 NVMe SSD）時，若套用壓縮率較高但解壓成本較高的演算法，對整體讀取效能最可能產生何種影響？

options:
  - text: "由於高速儲存裝置的 I/O 延遲較低，解壓縮所消耗的 CPU 時間可能大於節省的 I/O 時間，導致整體讀取時間高於未壓縮狀態。"
    correct: true
    explanation: |
      正確。當儲存裝置具備較高 I/O 頻寬時，讀取原始資料所需時間可能已相對較短。若選用解壓成本較高的演算法，增加的 CPU 運算時間可能超過節省的 I/O 傳輸時間，使總體延遲增加。

  - text: "較高的壓縮率能減少資料傳輸量，因此整體讀取時間會隨壓縮率提高而持續下降。"
    explanation: |
      此敘述忽略了解壓縮時間的影響。總體讀取時間通常同時受到 I/O 傳輸與 CPU 解壓縮成本影響。

  - text: "CPU 的解壓縮速率會與儲存裝置的 I/O 吞吐量同步調整，因此在高速 SSD 上解壓縮速度也會提升。"
    explanation: |
      CPU 的解壓縮能力主要取決於處理器架構與演算法本身的計算成本，不會因儲存裝置速度提高而自動改變。

  - text: "高速儲存裝置通常會將解壓縮工作交由磁碟控制器處理，因此 CPU 使用率不會受到影響。"
    explanation: |
      一般軟體壓縮機制（如作業系統層級的 zstd）仍由主機端 CPU 執行。除非系統額外使用專用硬體加速機制，否則 CPU 負載通常仍會增加。
