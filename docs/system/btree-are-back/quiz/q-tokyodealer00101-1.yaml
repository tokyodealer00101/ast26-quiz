author: tokyodealer00101
date: 2026-05-28
question: |
  索引大小超過 buffer pool 時，哪種資料結構比較適合做成可以被 buffer manager 換出到 SSD 的索引，主要原因是什麼？
options:
  - text: "Adaptive B-Tree 較適合，因為它維持固定大小 page 與 page 內 record layout；buffer manager 可以用 page 為單位換出與讀回，較高的空間效率也能減少 SSD I/O。"
    correct: true
    explanation: |
      B-Tree 的 page-oriented 設計適合交給 buffer manager 管理。Adaptive B-Tree 仍保留固定大小 page，record 也直接放在 page 內，cold page 可以被換出到 SSD；再加上 prefix truncation、dense leaves 等空間效率優化，buffer pool 能容納更多有效資料，降低讀回 page 的壓力。

  - text: "Wormhole 較適合，因為 MetaTrieHT 能快速定位 leaf；只要把 hash table bucket 視為換頁單位，buffer manager 就能避開 B-Tree traversal 的 I/O 成本。"
    explanation: |
      Wormhole 的 lookup path 確實想降低 traversal 成本，但這不等於它適合被換出到 SSD。MetaTrieHT 是大型 hash table，record 又多半分散配置，並不是天然固定大小 page layout；資料超過 buffer pool 時，buffer manager 很難像管理 B-Tree page 一樣管理它。

  - text: "ART 較適合，因為 trie node 會依 key 分布壓縮路徑；即使索引被換出，只要依賴 mmap 或 OS swap，pointer-based node 仍能維持原本的 locality。"
    explanation: |
      ART 的路徑壓縮有助於 in-memory lookup，但它仍是 pointer-heavy trie。這類結構不容易整理成穩定的 4KB page 單位；被換出又讀回時，也不能把 virtual memory address 當成可靠的 on-disk reference，因此不如 page-oriented B-Tree 適合 buffer-managed SSD-backed index。

  - text: "Adaptive B-Tree 只有在改用 fingerprinting leaf 時才適合，因為 SIMD 掃描 fingerprint array 會降低 point lookup 成本，讓資料超過 buffer pool 後不必特別處理 page eviction。"
    explanation: |
      Fingerprinting leaf 解決的是 leaf 內比較與 cache miss 的成本，不是 out-of-memory 場景的核心問題。索引大小超過 buffer pool 時，重點是整個索引能不能用固定大小 page 管理、冷資料能不能被可靠地換出到 SSD，以及空間效率能否減少 page 讀回次數。
