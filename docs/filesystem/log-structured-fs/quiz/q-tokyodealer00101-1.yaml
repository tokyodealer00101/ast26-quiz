author: tokyodealer00101
date: 2026-05-28
question: |
  某個 Log-Structured File System 的背景 cleaner 準備從下列候選 segment 中挑一個 victim 做 `segment cleaning`。清理時，系統必須先把仍有效的 blocks 複製到新的 log tail，舊 segment 才能整段釋放。

  目前候選 segment 如下：

  | Segment | 資料更新頻率 | valid blocks | invalid blocks |
  |---|---|---:|---:|
  | S0 | 低（偏 cold） | 82 | 18 |
  | S1 | 高（偏 hot） | 20 | 80 |
  | S2 | 高（偏 hot） | 45 | 55 |
  | S3 | 低（偏 cold） | 68 | 32 |

  若目標是用較低搬移成本回收較多可用空間，應優先選哪個 segment？
options:
  - text: "選 S0，因為它偏 cold，清理後比較不會很快又產生新的 invalid blocks，可以避免 cleaner 反覆處理同類資料。"
    explanation: |
      S0 雖然偏 cold，但仍有 82 個 valid blocks。LFS 在清理 segment 時必須把這些仍有效的 blocks 搬到新的 log tail，搬移成本很高，而且只能回收 18 個 invalid blocks 對應的空間。
  - text: "選 S1，因為它偏 hot 且多數 blocks 已經失效，清理時只需要搬移少量仍有效的資料。"
    correct: true
    explanation: |
      S1 需要搬移的 valid blocks 最少，且能回收的 invalid blocks 最多。`segment cleaning` 的搬移成本主要來自仍有效的 blocks；依表中的 valid / invalid blocks 數量判斷，S1 的成本效益最好。
  - text: "選 S2，因為它偏 hot 且已有超過一半的 blocks 失效；先清理它可以回收不少空間，同時搬移成本看起來仍可接受。"
    explanation: |
      S2 確實有 55 個 invalid blocks，清理後能回收不少空間，但仍需搬移 45 個 valid blocks。相較之下，S1 只需搬移 20 個 valid blocks，且可回收 80 個 invalid blocks 對應的空間，所以 S1 的成本效益仍較好。
  - text: "選 S3，因為它偏 cold 且 invalid blocks 比 S0 多；清理它可以比 S0 回收更多空間，同時 cold 資料後續更新少。"
    explanation: |
      S3 雖然比 S0 能回收更多空間，但仍要搬移 68 個 valid blocks，成本明顯高於 S1。依課程中的 `segment cleaning` 流程，應優先選 invalid blocks 多、valid blocks 少的 segment；S1 的成本效益最好。
